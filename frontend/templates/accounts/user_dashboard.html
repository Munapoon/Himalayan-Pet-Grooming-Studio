{% extends 'base.html' %}

{% block title %}Dashboard - Himalayan Pet Studio{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body text-center p-5">
            <h1 class="display-4 text-primary mb-4">
                <i class="fas fa-paw me-3"></i>My Dashboard
            </h1>
            <p class="lead mb-4">Welcome back, {{ user.first_name|default:user.username }}!</p>

            <div class="row justify-content-center mt-5">
                <div class="col-md-4">
                    <div class="card mb-3">
                        <div class="card-body">
                            <i class="fas fa-calendar-alt fa-3x text-info mb-3"></i>
                            <h5>My Appointments</h5>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card mb-3">
                        <div class="card-body">
                            <i class="fas fa-shopping-bag fa-3x text-warning mb-3"></i>
                            <h5>My Orders</h5>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <a href="{% url 'logout' %}" class="btn btn-danger btn-lg">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
