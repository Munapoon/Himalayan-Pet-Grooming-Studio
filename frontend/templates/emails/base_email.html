<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #2c3e50, #b51c3a); color: #fff; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .content { padding: 30px; background: #fff; }
        .footer { background: #f8f9fa; color: #777; padding: 20px; text-align: center; font-size: 12px; border-top: 1px solid #eee; }
        .button { display: inline-block; padding: 12px 25px; background-color: #b51c3a; color: #fff; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        .details-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .details-table th, .details-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .details-table th { color: #555; background: #fcfcfc; }
        .highlight { color: #b51c3a; font-weight: bold; }
        .notice-box { background: #fff8e1; border-left: 4px solid #ffc107; padding: 15px; margin-top: 20px; border-radius: 4px; }
        .item-list { list-style: none; padding: 0; }
        .item-list li { border-bottom: 1px dashed #ddd; padding: 8px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HIMALAYAN PET STUDIO</h1>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>&copy; 2026 Himalayan Pet Grooming Studio. All rights reserved.</p>
            <p>Visit us at: Kathmandu, Nepal | Phone: +977 123456789</p>
        </div>
    </div>
</body>
</html>
