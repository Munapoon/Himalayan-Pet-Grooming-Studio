{% extends 'base.html' %}

{% block title %}Delete Pet - Himalayan Pet Studio{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm text-center p-4">
                <div class="card-body">
                    <div class="text-danger mb-4">
                        <i class="fas fa-exclamation-triangle fa-3x"></i>
                    </div>
                    <h2 class="h4 mb-3">Remove {{ pet.name }}?</h2>
                    <p class="text-muted mb-4">Are you sure you want to remove this pet from your profile? This action cannot be undone.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center">
                            <a href="{% url 'pet_list' %}" class="btn btn-light px-4 mr-2">Cancel</a>
                            <button type="submit" class="btn btn-danger px-4">Confirm Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
